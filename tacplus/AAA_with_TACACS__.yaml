    configuration:
      - name: tac_plus.conf
        content: |-
          key = sewer_mermaid
          accounting file = /var/log/tacplus-acct.log

          acl = default {
              permit = 192.168.1.0/24
          }

          host = 192.168.1.0/24 {
              prompt = "TACACS+ auth: "
          }

          group = netadmin {
              default service = permit
              service = exec {
                  priv-lvl = 15
                  idletime = 10
                  timeout  = 60
              }
          }

          group = netoper {
              default service = deny    # default-deny for unlisted services/commands
              service = exec {
                  priv-lvl = 15
                  idletime = 10
                  timeout  = 30
              }
              cmd = show       { permit .* }
              cmd = ping       { permit .* }
              cmd = traceroute { permit .* }
              cmd = exit       { permit .* }
              cmd = configure  { deny   .* }
          }

          user = $enab15$ {
              login = cleartext cisco
          }

          user = riven {
              login = cleartext valor
              member = netadmin
          }

          user = qiyana {
              login = cleartext elemental
              member = netoper
          }

          # NX-OS RBAC
          user = luna {
              login = cleartext eclipse
              service = exec {
                  shell:roles="\"network-admin vdc-admin\""
              }
          }

          user = orcale {
              login = cleartext flame
              service = exec {
                  shell:roles="\"network-operator vdc-operator\""
              }
          }
      - name: boot.sh
        content: |-
          # insert more commands here
          ip address add dev eth0 192.168.1.10/24
          ip link set dev eth0 up
          #
          # keep the next line to indicate that the machine is ready
          echo "READY" >/dev/console
          exit 0
